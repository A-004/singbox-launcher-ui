<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singbox Launcher</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Singbox Launcher</span>
        </div>
      </div>
      <div class="header-right">
        <span class="core-version" id="coreVersion">—</span>
        <button class="settings-btn" title="Settings" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <!-- VPN Status Card -->
      <section class="status-card">
        <div class="vpn-status" id="vpnStatus">
          <div class="vpn-indicator" id="vpnIndicator">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="vpn-info">
            <span class="vpn-label" id="vpnLabel">Disconnected</span>
            <span class="vpn-subtitle" id="vpnSubtitle">VPN is not active</span>
          </div>
        </div>
        <button class="vpn-toggle" id="vpnToggle" onclick="toggleVPN()">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </section>

      <!-- Stats Grid -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="proxyCount">0</span>
            <span class="stat-label">Proxies</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="activeProxy">—</span>
            <span class="stat-label">Active</span>
          </div>
        </div>
      </section>

      <!-- Proxy List -->
      <section class="proxy-section">
        <div class="section-header">
          <h2>Proxy Servers</h2>
          <span class="proxy-count-badge" id="proxyBadge">0</span>
        </div>
        <div class="proxy-list" id="proxyList">
          <div class="proxy-item empty-state">
            <span>No proxies loaded</span>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span>Singbox Launcher</span>
      <span class="status-dot" id="statusDot"></span>
    </footer>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
